<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pricing Option D - Producer Brief</title>
    <link rel="stylesheet" href="./pricing-experiments.css" />
  </head>
  <body>
    <main class="experiment-shell">
      <a class="back-link" href="./index.html">Pricing options</a>
      <section class="study study--light pad">
        <div class="topline">
          <div>
            <p class="eyebrow">Option D</p>
            <h1 class="display section-title">Producer brief</h1>
            <p class="muted">A less calculator-looking direction: the estimate reads like a production slate beside the intake brief.</p>
          </div>
        </div>

        <div class="producer-grid">
          <aside class="brief-slate vf">
            <span class="vf__c"></span>
            <p class="eyebrow">Quote slate</p>
            <h3>Event filming</h3>
            <div class="range">£1,800 - £2,800</div>
            <div class="brief-line"><span>Duration</span><strong>Full day</strong></div>
            <div class="brief-line"><span>Camera</span><strong>1 camera</strong></div>
            <div class="brief-line"><span>Outputs</span><strong>Overview + 10 clips</strong></div>
            <div class="button-row">
              <a class="btn" href="#">Book call</a>
              <a class="btn btn--ghost" href="#">Send brief</a>
            </div>
          </aside>

          <div class="producer-form">
            <div class="service-switcher">
              <button><span class="num">01</span><strong>Podcast</strong><small>Series scope</small></button>
              <button aria-pressed="true"><span class="num">02</span><strong>Event</strong><small>Capture package</small></button>
              <button><span class="num">03</span><strong>Doc</strong><small>Story brief</small></button>
              <button><span class="num">04</span><strong>Coaching</strong><small>Prep session</small></button>
              <button><span class="num">05</span><strong>Other</strong><small>Open brief</small></button>
            </div>
            <div class="console">
              <div class="form-grid">
                <label class="field"><span>Event length</span><select><option>Full day</option></select></label>
                <label class="field"><span>Location</span><select><option>Glasgow</option></select></label>
                <label class="field"><span>Cameras</span><select><option>1 camera</option></select></label>
                <label class="field"><span>Social clips</span><input value="10" /></label>
              </div>
              <div class="checkbox-grid" style="margin-top: 1rem;">
                <label class="check"><input type="checkbox" checked /> Overview / ad video</label>
                <label class="check"><input type="checkbox" /> Complex edit uplift</label>
                <label class="check"><input type="checkbox" /> Raw footage</label>
                <label class="check"><input type="checkbox" /> Add a gimbal</label>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
