<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resources Experiment - Newsletter Panel</title>
    <link rel="stylesheet" href="/sections/experiments.css" />
  </head>
  <body>
    <main class="stage">
      <section class="section pad">
        <div class="split">
          <div>
            <p class="eyebrow">Resources</p>
            <h2>Media notes from Plistic.</h2>
            <p>Newsletter-ready layout for Mailchimp or MailerLite once the platform is confirmed.</p>
          </div>
          <form class="card">
            <h3>Join the list</h3>
            <p>One useful note at a time.</p>
            <div class="button-row" style="margin-top: 18px">
              <span class="chip">you@example.com</span>
              <a class="button" href="#">Subscribe</a>
            </div>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
